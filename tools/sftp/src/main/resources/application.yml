sftp:
  host: your-sftp-server.com
  port: 22
  username: your-username
  password: ${SFTP_PASSWORD:} # 推荐从环境变量读取敏感信息[reference:8]
  private-key-path: ${SFTP_PRIVATE_KEY_PATH:} # 私钥认证路径（可选）[reference:9]
  connect-timeout: 10000      # 连接超时（毫秒）[reference:10]
  session-timeout: 30000      # 会话超时（毫秒）[reference:11]
  pool:                       # 连接池配置[reference:12]
    max-total: 10
    max-idle: 5
    min-idle: 2
  root-directory: /uploads    # 默认远程根目录（可选）[reference:13]